name: unpub
description: Self-hosted private Dart Pub server for Enterprise, with a simple web interface to search and view packages information.
version: 2.0.1-dev.0
homepage: https://github.com/bytedance/unpub
environment:
  sdk: ">=3.0.0 <4.0.0"
executables:
  unpub: unpub
dependencies:
  args: ^2.4.0
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  http_parser: ^4.0.0
  http: ^1.1.0
  archive: ^3.6.0
  logging: ^1.2.0
  meta: ^1.9.0
  googleapis: ^13.0.0
  yaml: ^3.1.0
  pub_semver: ^2.1.0
  json_annotation: ^4.8.0
  mongo_dart: ^0.10.0
  sqflite_common_ffi: ^2.3.0
  mime: ^1.0.0
  intl: ^0.19.0
  path: ^1.8.0
  collection: ^1.17.0
  shelf_cors_headers: ^0.1.2

dev_dependencies:
  test: ^1.24.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  shelf_router_generator: ^1.1.0
  chunked_stream: ^1.4.0
